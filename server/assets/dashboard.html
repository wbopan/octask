  <link rel="stylesheet" href="/assets/vendor/fonts.css">
  <script src="/assets/vendor/lucide.min.js"></script>
  <link rel="stylesheet" href="/assets/dashboard.css">
</head>
<body>

  <div class="app-body" id="appBody" style="position: relative;">
    <div class="empty-overlay" id="emptyState">
      <h2>Loading...</h2>
      <p>Fetching tasks from server</p>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar" style="display:none;">
      <div class="sidebar-brand">
        <svg class="logo" viewBox="0 0 21 13" shape-rendering="crispEdges">
          <rect x="14" y="0" width="1" height="1" fill="#6b3a1f"/><rect x="15" y="0" width="6" height="1" fill="#c4613c"/>
          <rect x="3" y="1" width="11" height="1" fill="#d4785c"/><rect x="14" y="1" width="1" height="1" fill="#6b3a1f"/><rect x="15" y="1" width="5" height="1" fill="#faf9f5"/><rect x="20" y="1" width="1" height="1" fill="#c4613c"/>
          <rect x="3" y="2" width="11" height="1" fill="#d4785c"/><rect x="14" y="2" width="1" height="1" fill="#6b3a1f"/><rect x="15" y="2" width="1" height="1" fill="#faf9f5"/><rect x="16" y="2" width="4" height="1" fill="#9a9a98"/><rect x="20" y="2" width="1" height="1" fill="#c4613c"/>
          <rect x="3" y="3" width="2" height="1" fill="#d4785c"/><rect x="5" y="3" width="1" height="1" fill="#111"/><rect x="6" y="3" width="6" height="1" fill="#d4785c"/><rect x="12" y="3" width="1" height="1" fill="#111"/><rect x="13" y="3" width="1" height="1" fill="#d4785c"/><rect x="14" y="3" width="1" height="1" fill="#6b3a1f"/><rect x="15" y="3" width="5" height="1" fill="#faf9f5"/><rect x="20" y="3" width="1" height="1" fill="#c4613c"/>
          <rect x="3" y="4" width="1" height="1" fill="#d4785c"/><rect x="4" y="4" width="1" height="1" fill="#111"/><rect x="5" y="4" width="1" height="1" fill="#d4785c"/><rect x="6" y="4" width="1" height="1" fill="#111"/><rect x="7" y="4" width="4" height="1" fill="#d4785c"/><rect x="11" y="4" width="1" height="1" fill="#111"/><rect x="12" y="4" width="1" height="1" fill="#d4785c"/><rect x="13" y="4" width="1" height="1" fill="#111"/><rect x="14" y="4" width="1" height="1" fill="#6b3a1f"/><rect x="15" y="4" width="1" height="1" fill="#faf9f5"/><rect x="16" y="4" width="4" height="1" fill="#9a9a98"/><rect x="20" y="4" width="1" height="1" fill="#c4613c"/>
          <rect x="1" y="5" width="13" height="1" fill="#d4785c"/><rect x="14" y="5" width="1" height="1" fill="#6b3a1f"/><rect x="15" y="5" width="5" height="1" fill="#faf9f5"/><rect x="20" y="5" width="1" height="1" fill="#c4613c"/>
          <rect x="1" y="6" width="13" height="1" fill="#d4785c"/><rect x="14" y="6" width="1" height="1" fill="#6b3a1f"/><rect x="15" y="6" width="1" height="1" fill="#faf9f5"/><rect x="16" y="6" width="4" height="1" fill="#9a9a98"/><rect x="20" y="6" width="1" height="1" fill="#c4613c"/>
          <rect x="3" y="7" width="11" height="1" fill="#d4785c"/><rect x="14" y="7" width="1" height="1" fill="#6b3a1f"/><rect x="15" y="7" width="5" height="1" fill="#faf9f5"/><rect x="20" y="7" width="1" height="1" fill="#c4613c"/>
          <rect x="3" y="8" width="11" height="1" fill="#d4785c"/><rect x="14" y="8" width="1" height="1" fill="#6b3a1f"/><rect x="15" y="8" width="6" height="1" fill="#c4613c"/>
          <rect x="4" y="9" width="1" height="1" fill="#d4785c"/><rect x="6" y="9" width="1" height="1" fill="#d4785c"/><rect x="11" y="9" width="1" height="1" fill="#d4785c"/><rect x="13" y="9" width="1" height="1" fill="#d4785c"/>
          <rect x="4" y="10" width="1" height="1" fill="#d4785c"/><rect x="6" y="10" width="1" height="1" fill="#d4785c"/><rect x="11" y="10" width="1" height="1" fill="#d4785c"/><rect x="13" y="10" width="1" height="1" fill="#d4785c"/>
        </svg>
        <span class="sidebar-brand-title">Octask</span>
      </div>
      <!-- Project List -->
      <div class="sidebar-card scrollable borderless" id="projectListCard">
        <div class="sidebar-card-header">
          <div class="sidebar-card-title">Projects</div>
          <button class="add-section-btn" id="addSectionBtn" title="Add Section">+</button>
        </div>
        <div class="project-list" id="projectList"></div>
      </div>

      <!-- Usage Card (pinned to bottom) -->
      <div class="sidebar-usage-footer">
        <div class="sidebar-card" id="usageCard" style="display:none;">
          <div class="sidebar-card-title">Claude Code Usage</div>
          <div id="usageContent"></div>
        </div>
      </div>
    </div>

    <!-- BOARD (4 fixed status columns) -->
    <div class="board-area" id="boardArea" style="display:none;"></div>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Edit Task</h3>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button id="modalCancel">Cancel</button>
        <button id="modalSave" class="primary">Save</button>
      </div>
    </div>
  </div>

  <div class="file-changed-banner" id="fileChangedBanner">
    <span>File changed externally. Reload to see changes?</span>
    <button id="fileChangedReload">Reload</button>
  </div>
  <div class="error-banner" id="errorBanner">
    <span id="errorBannerMsg">Server disconnected</span>
    <button id="errorBannerRetry">Retry</button>
  </div>
  <button class="fab" id="fabAddTask" title="New Task">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
  <div class="status-bar" id="status"></div>

  <script src="/assets/dashboard.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(() => {});
    }
  </script>
</body>
