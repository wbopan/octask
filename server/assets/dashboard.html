<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Octask Dashboard</title>
  <meta name="theme-color" content="#f7f7f5">
  <link rel="manifest" href="/assets/manifest.json">
  <link rel="apple-touch-icon" href="/assets/icon-192.png">
  <link rel="icon" type="image/svg+xml" href="/assets/octopus.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap">
  <script src="https://unpkg.com/lucide@0.475.0/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="/assets/dashboard.css">
</head>
<body>

  <div class="app-body" id="appBody" style="position: relative;">
    <div class="empty-overlay" id="emptyState">
      <h2>Loading...</h2>
      <p>Fetching tasks from server</p>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar" style="display:none;">
      <!-- Project List -->
      <div class="sidebar-card scrollable borderless" id="projectListCard">
        <div class="sidebar-card-header">
          <div class="sidebar-card-title">Projects</div>
          <button class="add-section-btn" id="addSectionBtn" title="Add Section">+</button>
        </div>
        <div class="project-list" id="projectList"></div>
      </div>

      <!-- Usage Card (pinned to bottom) -->
      <div class="sidebar-usage-footer">
        <div class="sidebar-card" id="usageCard" style="display:none;">
          <div class="sidebar-card-title">Claude Code Usage</div>
          <div id="usageContent"></div>
        </div>
      </div>
    </div>

    <!-- BOARD -->
    <div class="board-wrapper" id="boardWrapper" style="display:none;">
      <div class="board-header"><h1 class="board-project-name" id="boardProjectName"></h1></div>
      <div class="board-area" id="boardArea"></div>
    </div>
  </div>

  <!-- MODAL (native <dialog> for focus trapping, Escape-to-close, ::backdrop) -->
  <dialog class="modal-dialog" id="modalDialog">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Edit Task</h3>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button id="modalCancel">Cancel</button>
        <button id="modalSave" class="primary">Save</button>
      </div>
    </div>
  </dialog>

  <div class="file-changed-banner" id="fileChangedBanner">
    <span>File changed externally. Reload to see changes?</span>
    <button id="fileChangedReload">Reload</button>
  </div>
  <div class="error-banner" id="errorBanner">
    <span id="errorBannerMsg">Server disconnected</span>
    <button id="errorBannerRetry">Retry</button>
  </div>
  <div class="quick-create-wrapper" id="quickCreateBar">
    <div class="quick-create-capsule" id="quickCreateCapsule">
      <button class="quick-create-editor" id="quickCreateEditor" title="Open in editor">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
      <input type="text" class="quick-create-input" id="quickCreateInput" placeholder="Describe a new task...">
    </div>
    <button class="quick-create-fab" id="quickCreateFab" title="New Task">
      <svg class="icon-plus" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <svg class="icon-copy" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 11 2-2-2-2"/><path d="M11 13h4"/><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/></svg>
    </button>
  </div>
  <div class="status-bar" id="status"></div>

  <script src="/assets/dashboard.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(() => {});
    }
  </script>
</body>
</html>
