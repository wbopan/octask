  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f6f1;
      --bg-warm: #f3f0e8;
      --bg-card: #ffffff;
      --text: #1a1917;
      --text-secondary: #5c5b56;
      --text-muted: #6b6a65;
      --accent: #c4613c;
      --accent-hover: #a8522f;
      --accent-light: rgba(196, 97, 60, 0.08);
      --border: #e3e1da;
      --border-light: #edebe5;
      --shadow-sm: 0 1px 2px rgba(26,25,23,0.04);
      --shadow-md: 0 4px 12px rgba(26,25,23,0.07);
      --shadow-lg: 0 12px 40px rgba(26,25,23,0.12);
      --status-todo: #e09400;
      --status-ongoing: #2563eb;
      --status-done: #16a34a;
      --status-canceled: #94a3b8;
      --radius: 10px;
      --radius-sm: 6px;
      --font: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --mono: 'DM Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      line-height: 1.5;
    }

    /* ===== HEADER ===== */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo { width: 56px; height: 56px; flex-shrink: 0; }

    .header-title {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .header-file {
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--mono);
      margin-top: 1px;
    }

    .header-right { display: flex; gap: 8px; align-items: center; }

    button {
      background: var(--bg-card);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 7px 14px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 12.5px;
      font-weight: 500;
      font-family: var(--font);
      transition: all 0.15s;
    }

    button:hover { background: var(--bg-warm); border-color: var(--text-muted); }

    button.primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    button.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    button:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ===== LAYOUT: sidebar + board ===== */
    .app-body {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 350px;
      min-width: 350px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--bg);
      overflow: hidden;
    }

    .sidebar-usage-footer {
      margin-top: auto;
      flex-shrink: 0;
      padding: 12px 16px;
    }

    .sidebar-usage-footer .sidebar-card {
      margin: 0;
      background: var(--bg-warm);
      border-color: var(--border);
    }

    .sidebar-section-title {
      padding: 16px 16px 8px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-secondary);
      flex-shrink: 0;
    }

    .sidebar-card {
      margin: 0 16px 12px;
      padding: 14px;
      background: transparent;
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      flex-shrink: 0;
    }

    .sidebar-card.scrollable {
      overflow-y: auto;
      flex: 1;
      min-height: 0;
    }

    .sidebar-card.borderless {
      border: none;
      border-radius: 0;
      margin: 0;
      padding: 14px 16px;
    }

    .sidebar-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .sidebar-card-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-secondary);
    }

    .sidebar-card > .sidebar-card-title {
      margin-bottom: 10px;
    }

    .sidebar-card-title.normal-case {
      text-transform: none;
      letter-spacing: normal;
      font-size: 13px;
    }

    .add-phase-btn {
      width: 22px;
      height: 22px;
      padding: 0;
      font-size: 15px;
      font-weight: 400;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 5px;
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-muted);
      opacity: 0;
      transition: opacity 0.15s, border-color 0.15s, color 0.15s;
      cursor: pointer;
    }

    .sidebar-card:hover .add-phase-btn { opacity: 1; }
    .add-phase-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .usage-row { margin-bottom: 10px; }
    .usage-row:last-child { margin-bottom: 0; }
    .usage-row-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .usage-label { font-size: 12px; color: var(--text-secondary); }
    .usage-pct { font-size: 12px; font-weight: 700; font-family: var(--mono); }
    .usage-bar { height: 4px; background: var(--border-light); border-radius: 2px; overflow: hidden; }
    .usage-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
    .usage-reset { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

    .global-stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .global-stat {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .global-stat .status-icon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .global-stat .status-icon svg {
      width: 12px;
      height: 12px;
    }

    .global-stat .num {
      font-weight: 700;
      font-size: 14px;
      color: var(--text);
    }

    .global-progress {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .global-progress-bar {
      flex: 1;
      height: 4px;
      background: var(--border-light);
      border-radius: 2px;
      overflow: hidden;
      display: flex;
    }

    .global-progress-bar .done { background: var(--status-done); }
    .global-progress-bar .ongoing { background: var(--status-ongoing); }
    .global-progress-bar .canceled { background: var(--status-canceled); }

    .global-pct {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      font-family: var(--mono);
      min-width: 28px;
      text-align: right;
    }

    /* Phase list */
    .phase-list {
      padding: 0;
      margin-top: 12px;
      border-top: 1px solid var(--border-light);
      padding-top: 8px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-light);
    }

    .phase-list::-webkit-scrollbar { width: 4px; }
    .phase-list::-webkit-scrollbar-track { background: transparent; }
    .phase-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .phase-item {
      padding: 8px 10px;
      cursor: pointer;
      transition: background 0.15s;
      border-left: 3px solid transparent;
      border-radius: 6px;
      margin: 1px 0;
    }

    .phase-item:hover { background: var(--bg-warm); }

    .phase-item.active {
      background: var(--accent-light);
      border-left-color: var(--accent);
    }

    .phase-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .phase-item-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .phase-item-count {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-muted);
      font-family: var(--mono);
      margin-left: 8px;
      flex-shrink: 0;
    }

    .phase-item-bar {
      height: 4px;
      background: var(--border-light);
      border-radius: 2px;
      overflow: hidden;
      display: flex;
      margin-bottom: 4px;
    }

    .phase-item-bar .done { background: var(--status-done); transition: width 0.3s; }
    .phase-item-bar .ongoing { background: var(--status-ongoing); transition: width 0.3s; }
    .phase-item-bar .canceled { background: var(--status-canceled); transition: width 0.3s; }

    .phase-item-counts {
      display: flex;
      gap: 8px;
    }

    .phase-mini-stat {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .phase-mini-stat .status-icon {
      width: 12px;
      height: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .phase-mini-stat .status-icon svg {
      width: 12px;
      height: 12px;
    }

    .phase-item-goal {
      font-size: 12px;
      line-height: 1.5;
      color: var(--text-muted);
      margin-top: 6px;
      padding: 6px 8px;
      background: rgba(255,255,255,0.5);
      border-radius: 4px;
      display: none;
      overflow: hidden;
      max-height: 80px;
      position: relative;
    }

    .phase-item-goal::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 16px;
      background: linear-gradient(transparent, rgba(255,255,255,0.5));
    }

    .phase-item.active .phase-item-goal { display: block; }

    .phase-item-actions {
      display: none;
      margin-top: 6px;
      gap: 4px;
    }

    .phase-item.active .phase-item-actions { display: flex; }

    .phase-item-actions button {
      font-size: 12px;
      padding: 3px 8px;
      background: transparent;
      border: 1px solid var(--border);
    }

    .phase-item-actions button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .sidebar-footer { display: none; }

    /* ===== BOARD ===== */
    .board-area {
      flex: 1;
      display: flex;
      overflow-x: auto;
      overflow-y: hidden;
      min-width: 0;
    }

    .status-column {
      flex: 1;
      min-width: 260px;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border-light);
      overflow: hidden;
    }

    .status-column:last-child { border-right: none; }

    .status-column-header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border-light);
      background: var(--bg);
    }

    .status-column-header .status-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .status-column-header .status-icon svg {
      width: 14px;
      height: 14px;
    }

    .status-column-name {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-secondary);
    }

    .status-column-count {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      background: var(--bg-warm);
      padding: 1px 7px;
      border-radius: 8px;
      margin-left: auto;
    }

    .status-column-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px 10px 16px;
      min-height: 0;
    }

    .status-column-body::-webkit-scrollbar { width: 4px; }
    .status-column-body::-webkit-scrollbar-track { background: transparent; }
    .status-column-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .status-column-body.drag-over {
      background: var(--accent-light);
    }

    /* Phase section within a column */
    .phase-section {
      margin-bottom: 12px;
    }

    .phase-section-header {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      padding: 6px 6px 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      background: transparent;
      z-index: 2;
    }


    /* ===== TASK CARD ===== */
    .task-card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      padding: 10px 12px;
      margin-bottom: 6px;
      cursor: grab;
      transition: all 0.15s;
      box-shadow: var(--shadow-sm);
      position: relative;
    }

    .task-card:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--border);
    }

    .task-card.dragging {
      opacity: 0.4;
      transform: rotate(1.5deg);
    }

    .task-card-title {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text);
      cursor: pointer;
    }

    .task-card-title.crossed {
      color: var(--text-muted);
      text-decoration: line-through;
    }

    .task-card-desc {
      font-size: 11.5px;
      color: var(--text-muted);
      margin-top: 4px;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      cursor: pointer;
    }

    .task-card-desc:hover { }

    /* Shimmer effect for running session cards */
    .task-card.session-running .task-card-title,
    .task-card.session-running .task-card-desc,
    .task-card.session-running .task-card-ac {
      background: linear-gradient(90deg, #1a1917 25%, #22c55e 45%, #22c55e 55%, #1a1917 75%);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 5s linear infinite;
    }
    .task-card.session-running .task-card-desc,
    .task-card.session-running .task-card-ac {
      background: linear-gradient(90deg, #64748b 25%, #22c55e 45%, #22c55e 55%, #64748b 75%);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 5s linear infinite;
    }
    .task-card.session-running .task-card-ac .ac-label {
      -webkit-text-fill-color: initial;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .task-card-ac {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid var(--border-light);
      font-size: 11px;
      line-height: 1.45;
      color: var(--text-muted);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      cursor: pointer;
    }

    .task-card-ac:hover { }

    .slug-copy-btn {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      transition: all 0.15s;
    }
    .slug-copy-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .slug-copy-btn svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }



    .ac-label {
      font-weight: 700;
      color: var(--accent);
      font-size: 9.5px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-right: 3px;
    }

    .task-card-actions {
      display: none;
      position: absolute;
      top: 6px;
      right: 6px;
      gap: 3px;
      align-items: center;
    }

    .task-card:hover .task-card-actions { display: flex; }

    .task-card-actions button {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      color: var(--text-muted);
      cursor: pointer;
      width: 24px;
      height: 24px;
      padding: 0;
      line-height: 1;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }
    .task-card-actions button svg {
      width: 13px;
      height: 13px;
      flex-shrink: 0;
    }
    .task-card-actions button:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 6%, var(--bg-card));
    }

    /* Ghost (Ghostty focus) button — same size, tinted to stand out */
    .task-card-actions button.ghostty-btn {
      background: color-mix(in srgb, var(--status-ongoing) 8%, var(--bg-card));
      border-color: color-mix(in srgb, var(--status-ongoing) 25%, var(--border-light));
      color: var(--status-ongoing);
    }
    .task-card-actions button.ghostty-btn:hover {
      background: color-mix(in srgb, var(--status-ongoing) 15%, var(--bg-card));
      border-color: var(--status-ongoing);
      color: var(--status-ongoing);
    }

    .drop-indicator {
      height: 2.5px;
      background: var(--accent);
      border-radius: 2px;
      margin: 3px 0;
    }

    /* ===== SESSION STATUS DOT ===== */
    .session-dot {
      display: inline-block;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      flex-shrink: 0;
      vertical-align: -2px;
      margin-right: 6px;
    }
    .session-dot.running   { background: #22c55e; }
    .session-dot.idle       { background: #f59e0b; }
    .session-dot.permission { background: #a855f7; box-shadow: 0 0 6px rgba(168, 85, 247, 0.4); }
    .session-dot.notfound   { background: #94a3b8; }
    .session-dot.none {
      background: none;
      border: 1.5px dashed #cbd5e1;
    }
    .session-dot.clickable {
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .session-dot.clickable:hover {
      transform: scale(1.3);
    }

    /* ===== EMPTY STATE ===== */
    .empty-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 10;
      background: var(--bg);
    }

    .empty-overlay h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .empty-overlay p {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 20px;
    }

    .empty-overlay button {
      font-size: 14px;
      padding: 10px 24px;
      background: var(--accent);
      border: none;
      color: white;
    }

    .empty-overlay button:hover { background: var(--accent-hover); }

    /* ===== MODAL ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26,25,23,0.45);
      z-index: 200;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(2px);
    }

    .modal-overlay.visible { display: flex; }

    .modal {
      background: var(--bg-card);
      border-radius: 14px;
      width: 92%;
      max-width: 580px;
      max-height: 82vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-lg);
    }

    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h3 { font-size: 15px; font-weight: 700; }

    .modal-close {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 20px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }

    .modal-close:hover { color: var(--text); }

    .modal-body {
      padding: 20px;
      overflow-y: auto;
      flex: 1;
    }

    .modal-body::-webkit-scrollbar { width: 4px; }
    .modal-body::-webkit-scrollbar-track { background: transparent; }
    .modal-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .modal-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .form-group { margin-bottom: 14px; }

    .form-group label {
      display: block;
      font-size: 10.5px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      color: var(--text);
      font-size: 13px;
      font-family: var(--font);
      line-height: 1.5;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-group textarea { min-height: 60px; resize: vertical; }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }

    .status-select-row { display: flex; gap: 6px; }

    .status-option {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 7px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 11.5px;
      font-weight: 500;
      color: var(--text-secondary);
      background: var(--bg);
      transition: all 0.15s;
    }

    .status-option:hover { border-color: var(--text-muted); }

    .status-option.selected {
      border-color: var(--accent);
      background: var(--accent-light);
      color: var(--accent);
      font-weight: 600;
    }

    .status-option .status-icon {
      width: 14px;
      height: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .status-option .status-icon svg {
      width: 12px;
      height: 12px;
    }

    .inline-input {
      width: 100%;
      background: var(--bg-card);
      border: 2px solid var(--accent);
      border-radius: var(--radius-sm);
      padding: 5px 8px;
      color: var(--text);
      font-size: inherit;
      font-family: var(--font);
      outline: none;
    }

    /* ===== STATUS BAR ===== */
    .status-bar {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text);
      color: var(--bg);
      padding: 8px 20px;
      border-radius: var(--radius);
      font-size: 12.5px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.2s;
      box-shadow: var(--shadow-lg);
      z-index: 300;
    }

    .status-bar.visible { opacity: 1; }

    /* ===== ERROR BANNER ===== */
    .file-changed-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #b45309;
      color: #fff;
      padding: 8px 24px;
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 401;
      transform: translateY(-100%);
      transition: transform 0.25s ease;
    }
    .file-changed-banner.visible { transform: translateY(0); }
    .file-changed-banner button {
      background: rgba(255,255,255,0.2);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 4px 12px;
      font-size: 12px;
      cursor: pointer;
      border-radius: 4px;
    }
    .file-changed-banner button:hover { background: rgba(255,255,255,0.3); }

    .error-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #dc2626;
      color: #fff;
      padding: 8px 24px;
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 400;
      transform: translateY(-100%);
      transition: transform 0.25s ease;
    }
    .error-banner.visible { transform: translateY(0); }
    .error-banner button {
      background: rgba(255,255,255,0.2);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 4px 12px;
      font-size: 12px;
      cursor: pointer;
      border-radius: 4px;
    }
    .error-banner button:hover { background: rgba(255,255,255,0.3); }

    .status-bar.error {
      background: #dc2626;
    }
  </style>
</head>
<body>

        <rect x="4" y="9" width="1" height="1" fill="#d4785c"/><rect x="6" y="9" width="1" height="1" fill="#d4785c"/><rect x="11" y="9" width="1" height="1" fill="#d4785c"/><rect x="13" y="9" width="1" height="1" fill="#d4785c"/>
        <rect x="4" y="10" width="1" height="1" fill="#d4785c"/><rect x="6" y="10" width="1" height="1" fill="#d4785c"/><rect x="11" y="10" width="1" height="1" fill="#d4785c"/><rect x="13" y="10" width="1" height="1" fill="#d4785c"/>

  <div class="app-body" id="appBody" style="position: relative;">

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar" style="display:none;">
      <!-- Progress + Phases -->

        <div class="sidebar-card-header">

      <!-- Usage Card (pinned to bottom) -->

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Edit Task</h3>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button id="modalCancel">Cancel</button>
        <button id="modalSave" class="primary">Save</button>
      </div>
    </div>
  </div>

  <div class="file-changed-banner" id="fileChangedBanner">
    <span>File changed externally. Reload to see changes?</span>
    <button id="fileChangedReload">Reload</button>
  </div>
  <div class="error-banner" id="errorBanner">
    <span id="errorBannerMsg">Server disconnected</span>
    <button id="errorBannerRetry">Retry</button>
  </div>
  <div class="status-bar" id="status"></div>

  <script>
    // ===== STATE =====
    const projectId = window.__projectId || null;
    let preamble = '';
    let phases = [];
    let hasChanges = false;
    let isSaving = false;
    let activePhaseId = null; // selected phase in sidebar, null = show all
    let sessionMap = {}; // customTitle → { sessionId, status, summary }

    // Undo stack — stores snapshots taken before each mutation
    const undoStack = [];
    const MAX_UNDO = 50;
    let lastCleanSnapshot = null;

    function takeSnapshot() {
      return JSON.parse(JSON.stringify(phases));
    }

    // Call this before any mutation to save the pre-mutation state
    function saveForUndo() {
      const snap = lastCleanSnapshot || takeSnapshot();
      undoStack.push(snap);
      if (undoStack.length > MAX_UNDO) undoStack.shift();
    }

    function undo() {
      if (undoStack.length === 0) { showStatus('Nothing to undo'); return; }
      phases = undoStack.pop();
      lastCleanSnapshot = takeSnapshot();
      hasChanges = true;
      $('saveBtn').disabled = false;
      if (saveTimeout) clearTimeout(saveTimeout);
      saveTimeout = setTimeout(autoSave, 600);
      render();
      showStatus('Undone');
    }

    const STATUS_ORDER = ['ongoing', 'todo', 'canceled', 'done'];
    const STATUS_LABELS = { todo: 'Pending', ongoing: 'Ongoing', done: 'Done', canceled: 'Backlog' };
    const STATUS_SYMBOLS = { todo: '[ ]', ongoing: '[/]', done: '[x]', canceled: '[-]' };
    const STATUS_COLORS = { ongoing: '#2563eb', todo: '#e09400', done: '#16a34a', canceled: '#94a3b8' };

    function statusIcon(status) {
      const c = STATUS_COLORS[status] || '#94a3b8';
      const icons = {
        ongoing: `<svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="8" r="6.5" stroke="${c}" stroke-width="1.8"/><polygon points="6.8,4.8 11.5,8 6.8,11.2" fill="${c}"/></svg>`,
        todo: `<svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="8" r="6.5" stroke="${c}" stroke-width="1.8"/><path d="M8 5v3.5l2.5 1.5" stroke="${c}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
        done: `<svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="8" r="6.5" stroke="${c}" stroke-width="1.8"/><path d="M5.2 8.2l2 2 3.6-4.4" stroke="${c}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
        canceled: `<svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 5.5h10v7.5a1.5 1.5 0 0 1-1.5 1.5h-7A1.5 1.5 0 0 1 3 13V5.5z" stroke="${c}" stroke-width="1.6"/><path d="M2 3.8a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v1.2H2V3.8z" stroke="${c}" stroke-width="1.6"/><path d="M6.5 8v4M9.5 8v4" stroke="${c}" stroke-width="1.4" stroke-linecap="round"/></svg>`,
      };
      return `<span class="status-icon">${icons[status] || ''}</span>`;
    }

    const $ = id => document.getElementById(id);
    const statusEl = $('status');
    const errorBanner = $('errorBanner');
    const errorBannerMsg = $('errorBannerMsg');
    let serverConnected = true;
    let saveRetryCount = 0;
    const MAX_SAVE_RETRIES = 3;

    function showStatus(msg, isError = false) {
      statusEl.textContent = msg;
      statusEl.classList.toggle('error', isError);
      statusEl.classList.add('visible');
      setTimeout(() => statusEl.classList.remove('visible'), isError ? 4000 : 2000);
    }

    function showErrorBanner(msg) {
      errorBannerMsg.textContent = msg;
      errorBanner.classList.add('visible');
      serverConnected = false;
    }

    function hideErrorBanner() {
      errorBanner.classList.remove('visible');
      serverConnected = true;
    }

    $('errorBannerRetry').addEventListener('click', async () => {
      errorBannerMsg.textContent = 'Reconnecting...';
      try {
        const res = await fetch('/api/health');
        if (res.ok) {
          hideErrorBanner();
          showStatus('Reconnected');
          if (hasChanges) autoSave();
        } else {
          errorBannerMsg.textContent = 'Server returned error — is it running?';
        }
      } catch {
        errorBannerMsg.textContent = 'Still disconnected — check if server is running';
      }
    });

    function makeId(name) {
      const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
      return slug || ('phase-' + uid());
    }

    function uid() { return Date.now() + Math.random(); }


    async function focusGhosttyTab(title) {
      try {
        const resp = await fetch('/api/focus-ghostty-tab', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title }),
        });
        const data = await resp.json();
        if (data.ok) {
          showStatus('Focused in Ghostty');
        } else {
          showStatus('No matching Ghostty tab found', true);
        }
      } catch {
        showStatus('Failed to focus Ghostty tab', true);
      }
    }

    function escapeHtml(text) {
      const d = document.createElement('div');
      d.textContent = text || '';
      return d.innerHTML;
    }

    function escapeAttr(text) {
      return (text || '').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ===== PARSE =====
    function parseTasksMd(content) {
      const result = [];
      let pre = '';
      let currentPhase = null;
      let currentTask = null;
      let inGoal = false;
      let goalLines = [];
      let descLines = [];

      for (const line of content.split('\n')) {
        const phaseMatch = line.match(/^## (.+)$/);
        if (phaseMatch) {
          if (currentTask && currentPhase) { flushTask(currentTask, descLines); currentPhase.tasks.push(currentTask); currentTask = null; descLines = []; }
          if (currentPhase && inGoal) { currentPhase.goal = goalLines.join(' ').trim(); inGoal = false; goalLines = []; }
          const name = phaseMatch[1].trim();
          currentPhase = { id: makeId(name), name, goal: '', tasks: [] };
          result.push(currentPhase);
          continue;
        }

        if (currentPhase && !currentTask) {
          const goalStart = line.match(/^Goal:\s*(.*)$/);
          if (goalStart) { inGoal = true; goalLines = [goalStart[1]]; continue; }
          if (inGoal) {
            if (line.trim() === '' && goalLines.length > 0) { currentPhase.goal = goalLines.join(' ').trim(); inGoal = false; goalLines = []; continue; }
            goalLines.push(line.trim());
            continue;
          }
        }

        const taskMatch = line.match(/^- \[([ xX\/\-])\]\s*(.*)$/);
        if (taskMatch && currentPhase) {
          if (inGoal) { currentPhase.goal = goalLines.join(' ').trim(); inGoal = false; goalLines = []; }
          if (currentTask) { flushTask(currentTask, descLines); currentPhase.tasks.push(currentTask); descLines = []; }
          const sym = taskMatch[1];
          let status = 'todo';
          if (sym === 'x' || sym === 'X') status = 'done';
          else if (sym === '/') status = 'ongoing';
          else if (sym === '-') status = 'canceled';
          const rawTitle = taskMatch[2].trim();
          const slugMatch = rawTitle.match(/^(.+?)\s+#([\w-]+)$/);
          const titleText = slugMatch ? slugMatch[1].trim() : rawTitle;
          const slug = slugMatch ? slugMatch[2] : '';
          currentTask = { id: uid(), title: titleText, slug, desc: '', ac: '', status, phaseId: currentPhase.id };
          descLines = [];
          continue;
        }

        if (currentTask && (line.startsWith('    ') || line.startsWith('\t'))) {
          descLines.push(line.replace(/^    |\t/, ''));
          continue;
        }

        if (currentTask && line.trim() === '') continue;

        if (currentTask && currentPhase && line.trim() !== '') {
          flushTask(currentTask, descLines);
          currentPhase.tasks.push(currentTask);
          currentTask = null;
          descLines = [];
        }

        if (!currentPhase) pre += line + '\n';
      }

      if (inGoal && currentPhase) currentPhase.goal = goalLines.join(' ').trim();
      if (currentTask && currentPhase) { flushTask(currentTask, descLines); currentPhase.tasks.push(currentTask); }

      preamble = pre;
      return result;
    }

    function flushTask(task, descLines) {
      const full = descLines.join('\n').trim();
      const acMatch = full.match(/^-?\s*AC:\s*(.+)$/m);
      if (acMatch) {
        task.ac = acMatch[1].trim();
        task.desc = full.replace(/^-?\s*AC:\s*.+$/m, '').replace(/\n{2,}/g, '\n').trim();
      } else {
        task.desc = full;
      }
    }

    // ===== SERIALIZE =====
    function toMarkdown() {
      let md = preamble;
      phases.forEach(phase => {
        md += `## ${phase.name}\n\n`;
        if (phase.goal) md += `Goal: ${phase.goal}\n\n`;
        phase.tasks.forEach(t => {
          md += `- ${STATUS_SYMBOLS[t.status] || '[ ]'} ${t.title}${t.slug ? ' #' + t.slug : ''}\n`;
          if (t.desc) t.desc.split('\n').forEach(l => { md += `    ${l}\n`; });
          if (t.ac) md += `    AC: ${t.ac}\n`;
        });
      });
      return md.trimEnd() + '\n';
    }

    // ===== STATS =====
    function allTasks() { return phases.flatMap(p => p.tasks); }

    function countByStatus(tasks) {
      const c = { todo: 0, ongoing: 0, done: 0, canceled: 0 };
      tasks.forEach(t => c[t.status]++);
      return c;
    }

    function pctDone(tasks) {
      if (tasks.length === 0) return 0;
      return Math.round((countByStatus(tasks).done / tasks.length) * 100);
    }

    // ===== RENDER =====
    function render() {
      renderSidebar();
      renderBoard();
      lucide.createIcons();
    }

    function flipAnimate(el, oldRect, spring) {
      const cur = el.getBoundingClientRect();
      const dx = oldRect.left - cur.left, dy = oldRect.top - cur.top;
      if (Math.abs(dx) < 1 && Math.abs(dy) < 1) return;
      el.style.transform = `translate(${dx}px,${dy}px)`;
      el.style.transition = 'none';
      el.offsetHeight;
      el.style.transition = `transform 0.35s ${spring}`;
      el.style.transform = '';
      el.addEventListener('transitionend', () => { el.style.transition = ''; }, { once: true });
    }

    function colIdx(el) {
      const col = el.closest('.status-column');
      return col ? [...col.parentElement.children].indexOf(col) : 0;
    }

    function animatedRender(skipTaskId) {
      const oldRects = new Map();
      document.querySelectorAll('.task-card').forEach(c => {
        oldRects.set('c-' + c.dataset.taskId, c.getBoundingClientRect());
      });
      document.querySelectorAll('.phase-section-header').forEach(h => {
        oldRects.set('h-' + colIdx(h) + '-' + h.textContent.trim(), h.getBoundingClientRect());
      });
      render();
      const spring = 'cubic-bezier(0.34, 1.56, 0.64, 1)';
      document.querySelectorAll('.task-card').forEach(c => {
        if (skipTaskId != null && c.dataset.taskId === String(skipTaskId)) return;
        const old = oldRects.get('c-' + c.dataset.taskId);
        if (old) flipAnimate(c, old, spring);
      });
      document.querySelectorAll('.phase-section-header').forEach(h => {
        const old = oldRects.get('h-' + colIdx(h) + '-' + h.textContent.trim());
        if (old) flipAnimate(h, old, spring);
      });
    }

    function renderSidebar() {
      const all = allTasks();
      const counts = countByStatus(all);
      const total = all.length;

      // Global stats
      $('globalStats').innerHTML = STATUS_ORDER.map(st =>
        `<div class="global-stat">${statusIcon(st)}<span class="num">${counts[st]}</span></div>`
      ).join('');

      // Global progress
      if (total > 0) {
        $('globalBar').innerHTML = `
          <div class="done" style="width:${(counts.done/total)*100}%"></div>
          <div class="ongoing" style="width:${(counts.ongoing/total)*100}%"></div>
        `;
      } else {
        $('globalBar').innerHTML = '';
      }
      $('globalPct').textContent = pctDone(all) + '%';

      // Phase list
      const list = $('phaseList');
      list.innerHTML = '';

      phases.forEach(phase => {
        const stats = countByStatus(phase.tasks);
        const total = phase.tasks.length;
        const isActive = activePhaseId === phase.id;

        const item = document.createElement('div');
        item.className = `phase-item ${isActive ? 'active' : ''}`;

        item.innerHTML = `
          <div class="phase-item-header">
            <span class="phase-item-name">${escapeHtml(phase.name)}</span>
            <span class="phase-item-count">${total}</span>
          </div>
          <div class="phase-item-bar">
            ${total > 0 ? `
              <div class="done" style="width:${(stats.done/total)*100}%"></div>
              <div class="ongoing" style="width:${(stats.ongoing/total)*100}%"></div>
            ` : ''}
          </div>
          <div class="phase-item-counts">
            ${STATUS_ORDER.filter(st => stats[st] > 0).map(st =>
              `<span class="phase-mini-stat">${statusIcon(st)}${stats[st]}</span>`
            ).join('')}
          </div>
          ${phase.goal ? `<div class="phase-item-goal">${escapeHtml(phase.goal)}</div>` : ''}
          <div class="phase-item-actions">
            <button data-action="edit-phase">Edit</button>
            <button data-action="delete-phase">Delete</button>
          </div>
        `;

        item.addEventListener('click', (e) => {
          if (e.target.closest('[data-action]')) return;
          activePhaseId = isActive ? null : phase.id;
          render();
        });

        item.querySelector('[data-action="edit-phase"]')?.addEventListener('click', (e) => {
          e.stopPropagation();
          editPhaseModal(phase);
        });

        item.querySelector('[data-action="delete-phase"]')?.addEventListener('click', (e) => {
          e.stopPropagation();
          if (phase.tasks.length > 0) {
            showStatus('Cannot delete a phase with tasks');
            return;
          }
          phases = phases.filter(p => p.id !== phase.id);
          if (activePhaseId === phase.id) activePhaseId = null;
          markChanged();
          render();
        });

        list.appendChild(item);
      });
    }

    function renderBoard() {
      const board = $('boardArea');
      board.innerHTML = '';

      // Determine which phases to show
      const visiblePhases = activePhaseId ? phases.filter(p => p.id === activePhaseId) : phases;

      STATUS_ORDER.forEach(status => {
        const col = document.createElement('div');
        col.className = 'status-column';
        col.dataset.status = status;

        // Gather tasks for this status across visible phases (always include all phases)
        let totalCount = 0;
        const phaseGroups = [];
        visiblePhases.forEach(phase => {
          const tasks = phase.tasks.filter(t => t.status === status);
          phaseGroups.push({ phase, tasks });
          totalCount += tasks.length;
        });

        // Header
        const header = document.createElement('div');
        header.className = 'status-column-header';
        header.innerHTML = `
          ${statusIcon(status)}
          <span class="status-column-name">${STATUS_LABELS[status]}</span>
          <span class="status-column-count">${totalCount}</span>
        `;
        col.appendChild(header);

        // Body
        const body = document.createElement('div');
        body.className = 'status-column-body';
        body.dataset.status = status;

        phaseGroups.forEach(({ phase, tasks }) => {
          const section = document.createElement('div');
          section.className = 'phase-section';
          section.dataset.phaseId = phase.id;

          // Phase section header (only show if more than 1 visible phase)
          if (visiblePhases.length > 1) {
            const sHeader = document.createElement('div');
            sHeader.className = 'phase-section-header';
            sHeader.textContent = phase.name;
            section.appendChild(sHeader);
          }

          tasks.forEach(task => {
            section.appendChild(createTaskCard(task, phase));
          });

          body.appendChild(section);
        });

        // If only 1 phase visible and column is empty, or "all" with no tasks, still show drop zone
        setupColumnDropZone(body, status);

        col.appendChild(body);
        board.appendChild(col);
      });
    }

    function createTaskCard(task, phase) {
      const card = document.createElement('div');
      card.className = 'task-card';
      card.draggable = true;
      card.dataset.taskId = task.id;
      card.dataset.phaseId = phase.id;

      // Actions
      const actions = document.createElement('div');
      actions.className = 'task-card-actions';
      if (task.status === 'ongoing') {
        const key = task.slug ? task.slug.replace(/^#/, '') : null;
        const session = key ? (sessionMap[key] || sessionMap['#' + key]) : null;
        if (session && ['running', 'idle', 'permission'].includes(session.status)) {
          const ghostBtn = document.createElement('button');
          ghostBtn.className = 'ghostty-btn';
          ghostBtn.innerHTML = '<i data-lucide="ghost"></i>';
          ghostBtn.title = 'Focus in Ghostty';
          ghostBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            focusGhosttyTab(key);
          });
          actions.appendChild(ghostBtn);
        }
      }
      if (task.slug) {
        const copyBtn = document.createElement('button');
        copyBtn.innerHTML = '<i data-lucide="copy"></i>';
        copyBtn.title = 'Copy ID';
        copyBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          navigator.clipboard.writeText(task.slug);
          copyBtn.style.color = 'var(--status-done)';
          copyBtn.style.borderColor = 'var(--status-done)';
          setTimeout(() => { copyBtn.style.color = ''; copyBtn.style.borderColor = ''; }, 800);
        });
        actions.appendChild(copyBtn);
      }
      const delBtn = document.createElement('button');
      delBtn.innerHTML = '<i data-lucide="x"></i>';
      delBtn.title = 'Delete';
      delBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteTask(task, phase); });
      actions.appendChild(delBtn);
      card.appendChild(actions);

      // Title
      const title = document.createElement('div');
      title.className = `task-card-title ${task.status === 'done' ? 'crossed' : ''}`;
      title.textContent = task.title;
      title.addEventListener('click', (e) => { e.stopPropagation(); openEditTaskModal(task, phase); });
      card.appendChild(title);

      // Description
      if (task.desc) {
        const desc = document.createElement('div');
        desc.className = 'task-card-desc';
        desc.textContent = task.desc;
        desc.addEventListener('click', (e) => { e.stopPropagation(); openEditTaskModal(task, phase); });
        card.appendChild(desc);
      }

      // AC
      if (task.ac) {
        const ac = document.createElement('div');
        ac.className = 'task-card-ac';
        ac.innerHTML = `<span class="ac-label">AC</span>${escapeHtml(task.ac)}`;
        ac.addEventListener('click', (e) => { e.stopPropagation(); openEditTaskModal(task, phase); });
        card.appendChild(ac);
      }

      // Session status dot (ongoing tasks only)
      if (task.status === 'ongoing') {
        const key = task.slug ? task.slug.replace(/^#/, '') : null;
        const session = key ? (sessionMap[key] || sessionMap['#' + key]) : null;
        const dot = document.createElement('span');
        dot.className = 'session-dot';
        if (session) {
          dot.classList.add(session.status); // running, idle, permission, notfound
          if (session.status === 'running') card.classList.add('session-running');
          const titles = { running: 'Running', idle: 'Idle', permission: 'Waiting for permission', notfound: 'Session ended' };
          dot.title = titles[session.status] || session.status;
          if (['running', 'idle', 'permission'].includes(session.status)) {
            dot.classList.add('clickable');
            dot.title += ' — click to focus in Ghostty';
            dot.addEventListener('click', (e) => {
              e.stopPropagation();
              focusGhosttyTab(key);
            });
          }
        } else {
          dot.classList.add('none');
          dot.title = 'No session linked';
        }
        title.prepend(dot);
      }

      // Drag
      card.addEventListener('dragstart', (e) => {
        card.classList.add('dragging');
        e.dataTransfer.setData('application/json', JSON.stringify({ taskId: task.id, phaseId: phase.id, fromStatus: task.status }));
        e.dataTransfer.effectAllowed = 'move';
      });
      card.addEventListener('dragend', () => {
        card.classList.remove('dragging');
        document.querySelectorAll('.drop-indicator').forEach(el => el.remove());
        document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      });

      return card;
    }

    function setupColumnDropZone(body, status) {
      body.addEventListener('dragover', (e) => {
        e.preventDefault();
        body.classList.add('drag-over');

        // Show indicator
        body.querySelectorAll('.drop-indicator').forEach(el => el.remove());
        const cards = [...body.querySelectorAll('.task-card:not(.dragging)')];

        // Find which phase section the cursor is over
        const sections = [...body.querySelectorAll('.phase-section')];
        let targetSection = null;
        for (const s of sections) {
          const r = s.getBoundingClientRect();
          if (e.clientY >= r.top && e.clientY <= r.bottom) { targetSection = s; break; }
        }

        // Find card to insert before (only within the target section if known)
        const searchCards = targetSection
          ? cards.filter(c => targetSection.contains(c))
          : cards;
        let insertBefore = null;
        for (const c of searchCards) {
          const r = c.getBoundingClientRect();
          if (e.clientY < r.top + r.height / 2) { insertBefore = c; break; }
        }

        const indicator = document.createElement('div');
        indicator.className = 'drop-indicator';
        if (insertBefore) {
          insertBefore.before(indicator);
        } else if (targetSection) {
          targetSection.appendChild(indicator);
        } else {
          body.appendChild(indicator);
        }
      });

      body.addEventListener('dragleave', (e) => {
        if (!body.contains(e.relatedTarget)) {
          body.classList.remove('drag-over');
          body.querySelectorAll('.drop-indicator').forEach(el => el.remove());
        }
      });

      body.addEventListener('drop', (e) => {
        e.preventDefault();
        body.classList.remove('drag-over');
        body.querySelectorAll('.drop-indicator').forEach(el => el.remove());

        try {
          const data = JSON.parse(e.dataTransfer.getData('application/json'));
          const srcPhase = phases.find(p => p.id === data.phaseId);
          if (!srcPhase) return;
          const taskIdx = srcPhase.tasks.findIndex(t => t.id == data.taskId);
          if (taskIdx === -1) return;
          const task = srcPhase.tasks[taskIdx];

          // Update status to match target column
          task.status = status;

          // Find position: which phase section and card to insert before
          const cards = [...body.querySelectorAll('.task-card:not(.dragging)')];
          const sections = [...body.querySelectorAll('.phase-section')];
          let targetSection = null;
          for (const s of sections) {
            const r = s.getBoundingClientRect();
            if (e.clientY >= r.top && e.clientY <= r.bottom) { targetSection = s; break; }
          }

          const searchCards = targetSection
            ? cards.filter(c => targetSection.contains(c))
            : cards;
          let beforeCard = null;
          for (const c of searchCards) {
            const r = c.getBoundingClientRect();
            if (e.clientY < r.top + r.height / 2) { beforeCard = c; break; }
          }

          // Remove from source phase
          srcPhase.tasks.splice(taskIdx, 1);

          if (beforeCard) {
            const bPhaseId = beforeCard.dataset.phaseId;
            const bTaskId = parseFloat(beforeCard.dataset.taskId);
            const dstPhase = phases.find(p => p.id === bPhaseId);
            if (dstPhase) {
              const bIdx = dstPhase.tasks.findIndex(t => t.id == bTaskId);
              if (bIdx !== -1) {
                dstPhase.tasks.splice(bIdx, 0, task);
              } else {
                dstPhase.tasks.push(task);
              }
            } else {
              srcPhase.tasks.push(task);
            }
          } else if (targetSection) {
            const dstPhase = phases.find(p => p.id === targetSection.dataset.phaseId);
            if (dstPhase) {
              dstPhase.tasks.push(task);
            } else {
              srcPhase.tasks.push(task);
            }
          } else {
            srcPhase.tasks.push(task);
          }

          markChanged();
          animatedRender(task.id);
        } catch (err) {}
      });
    }

    // ===== TASK OPERATIONS =====
    function deleteTask(task, phase) {
      const idx = phase.tasks.findIndex(t => t.id === task.id);
      if (idx !== -1) {
        phase.tasks.splice(idx, 1);
        markChanged();
        render();
      }
    }

    // ===== API I/O =====
    let saveTimeout = null;

    function markChanged() {
      if (lastCleanSnapshot) {
        undoStack.push(lastCleanSnapshot);
        if (undoStack.length > MAX_UNDO) undoStack.shift();
      }
      lastCleanSnapshot = takeSnapshot();

      hasChanges = true;
      $('saveBtn').disabled = false;
      if (saveTimeout) clearTimeout(saveTimeout);
      saveTimeout = setTimeout(autoSave, 600);
    }

    async function autoSave() {
      if (!projectId || !hasChanges || isSaving) return;
      isSaving = true;
      try {
        const res = await fetch(`/api/tasks/${encodeURIComponent(projectId)}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content: toMarkdown() })
        });
        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          throw new Error(body.error || `Server error (${res.status})`);
        }
        hasChanges = false;
        $('saveBtn').disabled = true;
        saveRetryCount = 0;
        if (!serverConnected) hideErrorBanner();
        showStatus('Saved');
      } catch (e) {
        const isNetworkError = e.message === 'Failed to fetch' || e.name === 'TypeError';
        if (isNetworkError) {
          showErrorBanner('Server disconnected — unsaved changes will be retried');
        }
        saveRetryCount++;
        if (saveRetryCount <= MAX_SAVE_RETRIES) {
          const delay = Math.min(1000 * Math.pow(2, saveRetryCount - 1), 8000);
          showStatus(`Save failed, retrying in ${delay / 1000}s...`, true);
          setTimeout(() => { isSaving = false; autoSave(); }, delay);
          return;
        }
        showStatus('Save failed: ' + e.message, true);
        saveRetryCount = 0;
      }
      isSaving = false;
    }

    // ===== USAGE CARD =====
    let usageData = null;

    async function fetchUsage() {
      try {
        const res = await fetch('/api/usage');
        if (!res.ok) return;
        usageData = await res.json();
        renderUsage();
      } catch {}
    }

    function renderUsage() {
      if (!usageData || usageData.error) {
        $('usageCard').style.display = 'none';
        return;
      }
      $('usageCard').style.display = '';
      const items = [];
      if (usageData.five_hour) {
        items.push(renderUsageBar('5h Window', usageData.five_hour));
      }
      if (usageData.seven_day) {
        items.push(renderUsageBar('7d Total', usageData.seven_day));
      }
      if (usageData.seven_day_sonnet?.utilization != null) {
        items.push(renderUsageBar('7d Sonnet', usageData.seven_day_sonnet));
      }
      if (usageData.seven_day_opus?.utilization != null) {
        items.push(renderUsageBar('7d Opus', usageData.seven_day_opus));
      }
      $('usageContent').innerHTML = items.join('');
    }

    function renderUsageBar(label, data) {
      const pct = data.utilization;
      const color = pct >= 80 ? 'var(--status-todo)' : pct >= 50 ? 'var(--accent)' : 'var(--status-done)';
      const resetStr = data.resets_at
        ? new Date(data.resets_at).toLocaleString('en', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' })
        : '';
      return `
        <div class="usage-row">
          <div class="usage-row-header">
            <span class="usage-label">${escapeHtml(label)}</span>
            <span class="usage-pct" style="color:${color}">${pct}%</span>
          </div>
          <div class="usage-bar">
            <div class="usage-bar-fill" style="width:${pct}%;background:${color}"></div>
          </div>
          ${resetStr ? `<div class="usage-reset">Resets ${escapeHtml(resetStr)}</div>` : ''}
        </div>
      `;
    }

    async function loadProject({ silent = false } = {}) {
      if (!projectId) return;
      try {
        const res = await fetch(`/api/tasks/${encodeURIComponent(projectId)}`);
        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          throw new Error(body.error || `Server returned ${res.status}`);
        }
        const data = await res.json();

        let parsed;
        try {
          parsed = parseTasksMd(data.content || '');
        } catch (parseErr) {
          throw new Error('TASKS.md has invalid format: ' + parseErr.message);
        }

        if (parsed.length === 0 && (data.content || '').trim().length > 0) {
          showStatus('Warning: no phases found — file may have unexpected format', true);
        }

        phases = parsed;

        $('emptyState').style.display = 'none';
        $('sidebar').style.display = 'flex';
        $('boardArea').style.display = 'flex';
        const projName = window.__projectName || projectId || 'TASKS.md';
        $('projectCardTitle').textContent = 'Project: ' + projName;

        lastCleanSnapshot = takeSnapshot();
        undoStack.length = 0;
        render();
        fetchUsage();
        if (!silent) showStatus('Loaded');
      } catch (e) {
        const isNetworkError = e.message === 'Failed to fetch' || e.name === 'TypeError';
        $('emptyState').querySelector('h2').textContent = isNetworkError ? 'Connection Failed' : 'Error';
        $('emptyState').querySelector('p').textContent = isNetworkError
          ? 'Could not reach the server — is it running on port 3847?'
          : e.message;
      }
    }

    async function fetchSessions() {
      if (!projectId) return;
      try {
        const resp = await fetch(`/api/sessions/${encodeURIComponent(projectId)}`);
        if (resp.ok) {
          sessionMap = await resp.json();
          if (!serverConnected) hideErrorBanner();
        }
      } catch {
        if (serverConnected && hasChanges) {
          showErrorBanner('Server disconnected — unsaved changes will be retried when reconnected');
        }
      }
    }

    // ===== FILE WATCH (SSE) =====
    let fileWatchSource = null;
    let selfSaveSuppress = 0; // timestamp until which to ignore change events

    function connectFileWatch() {
      if (!projectId || fileWatchSource) return;
      fileWatchSource = new EventSource(`/api/watch/${encodeURIComponent(projectId)}`);
      fileWatchSource.onmessage = (evt) => {
        try {
          const data = JSON.parse(evt.data);
          if (!data.changed) return;
          if (Date.now() < selfSaveSuppress) return; // ignore self-triggered save
          if (hasChanges) {
            $('fileChangedBanner').classList.add('visible');
          } else {
            loadProject({ silent: true });
          }
        } catch {}
      };
      fileWatchSource.onerror = () => {
        // EventSource auto-reconnects; just clean up state
        fileWatchSource.close();
        fileWatchSource = null;
        setTimeout(connectFileWatch, 3000);
      };
    }

    $('fileChangedReload').addEventListener('click', () => {
      $('fileChangedBanner').classList.remove('visible');
      hasChanges = false;
      loadProject();
    });

    // Patch autoSave to suppress self-triggered watch events
    const _origAutoSave = autoSave;
    autoSave = async function() {
      await _origAutoSave();
      selfSaveSuppress = Date.now() + 500;
    };

    loadProject().then(() => {
      fetchSessions().then(render);
      setInterval(async () => { await fetchSessions(); render(); }, 5000);
      setInterval(fetchUsage, 120000);
      connectFileWatch();
    });
    $('saveBtn').addEventListener('click', autoSave);

    window.addEventListener('beforeunload', (e) => {
      if (fileWatchSource) fileWatchSource.close();
      if (hasChanges) { e.preventDefault(); e.returnValue = ''; }
    });
    document.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 's') { e.preventDefault(); autoSave(); }
      if ((e.metaKey || e.ctrlKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
    });
  </script>
</body>
</html>
